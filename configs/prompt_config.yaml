direct:
  system_prompt: "You answer factual questions. Return only the shortest accurate answer phrase with no explanation, justification, or extra formatting."
  include_citations: false

rag:
  system_prompt: "Answer the factual question using only the provided evidence. Return only the shortest accurate answer phrase. If the evidence is insufficient, return INSUFFICIENT_EVIDENCE."
  include_citations: false
  max_passages: 5

evaluation:
  ask_for_confidence: true
